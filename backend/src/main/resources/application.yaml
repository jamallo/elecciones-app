spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/elecciones_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

cors:
  allowed-origins: http://localhost:4200

logging:
  level:
    com.elecciones: DEBUG

jwt:
  expiration: 36000000