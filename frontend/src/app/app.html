<div class="app-container" appTema>
  <!-- BARRA SUPERIOR MOBILE -->
  <mat-toolbar color="primary" class="toolbar-mobile">
    <button mat-icon-button (click)="toggleMenu()" class="menu-button">
      <lucide-angular name="Menu" [size]="22" [strokeWidth]="1.5"></lucide-angular>
    </button>
    <div class="logo-container">
      <lucide-angular name="Vote" class="logo-icon" [size]="24" [strokeWidth]="1.5"></lucide-angular>
      <span class="toolbar-title">Elecciones 2027</span>
    </div>
    <div class="spacer"></div>
    @if ((authService.currentUser$ | async); as user) {
      <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-button">
        <lucide-angular name="User" [size]="22" [strokeWidth]="1.5"></lucide-angular>
      </button>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item disabled>
          <lucide-angular name="User" [size]="16"></lucide-angular>
          {{ user.nombre }}
        </button>
        <mat-divider></mat-divider>
        @if (user.rol !== 'USUARIO') {
          <button mat-menu-item routerLink="/admin">
            <lucide-angular name="Shield" [size]="16"></lucide-angular>
            Administración
          </button>
        }
        <button mat-menu-item (click)="logout()">
          <lucide-angular name="LogOut" [size]="16"></lucide-angular>
          Cerrar sesión
        </button>
      </mat-menu>
    } @else {
      <button mat-icon-button routerLink="/login" class="login-button">
        <lucide-angular name="LogIn" [size]="22" [strokeWidth]="1.5"></lucide-angular>
      </button>
    }
  </mat-toolbar>

  <!-- MENÚ LATERAL MOBILE -->
  <div class="side-menu" [class.open]="menuOpen" (click)="closeMenu()">
    <div class="side-menu-content" (click)="$event.stopPropagation()">
      <div class="menu-header">
        <lucide-angular name="Vote" [size]="28"></lucide-angular>
        <span>Elecciones 2027</span>
        <button mat-icon-button (click)="closeMenu()">
          <lucide-angular name="X" [size]="20"></lucide-angular>
        </button>
      </div>
      <mat-nav-list>
        <a mat-list-item routerLink="/" (click)="closeMenu()">
          <lucide-angular name="Home" [size]="20" class="menu-icon"></lucide-angular>
          <span matListItemTitle>Inicio</span>
        </a>
        <a mat-list-item routerLink="/mapa" (click)="closeMenu()">
          <lucide-angular name="Map" [size]="20" class="menu-icon"></lucide-angular>
          <span matListItemTitle>Mapa electoral</span>
        </a>
        <a mat-list-item routerLink="/resultados" (click)="closeMenu()">
          <lucide-angular name="BarChart3" [size]="20" class="menu-icon"></lucide-angular>
          <span matListItemTitle>Resultados</span>
        </a>
        <a mat-list-item routerLink="/calendario" (click)="closeMenu()">
          <lucide-angular name="Calendar" [size]="20" class="menu-icon"></lucide-angular>
          <span matListItemTitle>Calendario</span>
        </a>
        <a mat-list-item routerLink="/partidos" (click)="closeMenu()">
          <lucide-angular name="Users" [size]="20" class="menu-icon"></lucide-angular>
          <span matListItemTitle>Partidos</span>
        </a>
      </mat-nav-list>
    </div>
  </div>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- BARRA INFERIOR MOBILE (TAB BAR) -->
  <div class="bottom-tab-bar">
    <button (click)="navigateTo('/')" [class.active]="isActive('/')">
      <lucide-angular name="Home" [size]="22"></lucide-angular>
      <span>Inicio</span>
    </button>
    <button (click)="navigateTo('/mapa')" [class.active]="isActive('/mapa')">
      <lucide-angular name="Map" [size]="22"></lucide-angular>
      <span>Mapa</span>
    </button>
    <button (click)="navigateTo('/resultados')" [class.active]="isActive('/resultados')">
      <lucide-angular name="BarChart3" [size]="22"></lucide-angular>
      <span>Resultados</span>
    </button>
    <button (click)="navigateTo('/calendario')" [class.active]="isActive('/calendario')">
      <lucide-angular name="Calendar" [size]="22"></lucide-angular>
      <span>Eventos</span>
    </button>
    <button (click)="navigateTo('/partidos')" [class.active]="isActive('/partidos')">
      <lucide-angular name="Users" [size]="22"></lucide-angular>
      <span>Partidos</span>
    </button>
  </div>
</div>
