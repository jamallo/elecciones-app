<div class="admin-dashboard">
  <div class="dashboard-header">
    <h1>Panel de Administración</h1>
    <p>Gestiona todo el contenido de la aplicación electoral</p>
  </div>

  <div class="stats-grid">
    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon partidos-icon">
          <lucide-angular name="Users" [size]="32" [strokeWidth]="1.5"></lucide-angular>
        </div>
        <div class="stat-info">
          <h3>{{ stats.partidos }}</h3>
          <p>Partidos políticos</p>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button routerLink="/admin/partidos">Gestionar</button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon elecciones-icon">
          <lucide-angular name="Vote" [size]="32" [strokeWidth]="1.5"></lucide-angular>
        </div>
        <div class="stat-info">
          <h3>{{ stats.elecciones }}</h3>
          <p>Elecciones</p>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button routerLink="/admin/elecciones">Gestionar</button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon candidatos-icon">
          <lucide-angular name="User" [size]="32" [strokeWidth]="1.5"></lucide-angular>
        </div>
        <div class="stat-info">
          <h3>{{ stats.candidatos || 0 }}</h3>
          <p>Candidatos</p>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button routerLink="/admin/candidatos">Gestionar</button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon eventos-icon">
          <lucide-angular name="Calendar" [size]="32" [strokeWidth]="1.5"></lucide-angular>
        </div>
        <div class="stat-info">
          <h3>{{ stats.eventos || 0 }}</h3>
          <p>Eventos</p>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button routerLink="/admin/eventos">Gestionar</button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="stat-card">
      <mat-card-content>
        <div class="stat-icon sedes-icon">
          <lucide-angular name="MapPin" [size]="32" [strokeWidth]="1.5"></lucide-angular>
        </div>
        <div class="stat-info">
          <h3>{{ stats.sedes || 0 }}</h3>
          <p>Sedes y colegios</p>
        </div>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button routerLink="/admin/sedes">Gestionar</button>
      </mat-card-actions>
    </mat-card>
  </div>

  <mat-card class="quick-actions">
    <mat-card-header>
      <mat-card-title>Acciones rápidas</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="actions-grid">
        <button mat-raised-button color="primary" routerLink="/admin/partidos">
          <lucide-angular name="Plus" [size]="16" [strokeWidth]="1.5"></lucide-angular>
          Nuevo partido
        </button>
        <button mat-raised-button color="accent" routerLink="/admin/candidatos">
          <lucide-angular name="UserPlus" [size]="16" [strokeWidth]="1.5"></lucide-angular>
          Nuevo candidato
        </button>
        <button mat-raised-button color="warn" routerLink="/admin/eventos">
          <lucide-angular name="CalendarPlus" [size]="16" [strokeWidth]="1.5"></lucide-angular>
          Nuevo evento
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
