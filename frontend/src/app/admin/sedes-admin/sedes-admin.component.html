<div class="sedes-admin">
  <div class="admin-header">
    <h1>Gestión de Sedes y Colegios Electorales</h1>
    <button mat-raised-button color="primary" (click)="abrirDialogo()">
      <lucide-angular name="Plus" [size]="16"></lucide-angular>
      Nueva sede
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div class="filter-container">
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Buscar sede</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Ej: Oviedo">
          <lucide-angular name="Search" [size]="16" class="search-icon"></lucide-angular>
        </mat-form-field>
      </div>

      <div class="table-container" *ngIf="!loading; else loadingSpinner">
        <table mat-table [dataSource]="dataSource" matSort>
          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
            <td mat-cell *matCellDef="let sede">{{ sede.nombre }}</td>
          </ng-container>

          <ng-container matColumnDef="direccion">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Dirección</th>
            <td mat-cell *matCellDef="let sede">{{ sede.direccion }}</td>
          </ng-container>

          <ng-container matColumnDef="tipo">
            <th mat-header-cell *matHeaderCellDef>Tipo</th>
            <td mat-cell *matCellDef="let sede">
              <mat-chip [color]="sede.tipo === 'SEDE_PARTIDO' ? 'primary' : 'accent'" highlighted>
                {{ sede.tipo === 'SEDE_PARTIDO' ? 'Sede de partido' : 'Colegio electoral' }}
              </mat-chip>
            </td>
          </ng-container>

          <ng-container matColumnDef="municipio">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Municipio</th>
            <td mat-cell *matCellDef="let sede">{{ sede.municipio }}</td>
          </ng-container>

          <ng-container matColumnDef="partido">
            <th mat-header-cell *matHeaderCellDef>Partido</th>
            <td mat-cell *matCellDef="let sede">
              <span *ngIf="sede.partidoNombre">{{ sede.partidoNombre }}</span>
              <span *ngIf="!sede.partidoNombre" class="text-muted">-</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let sede">
              <button mat-icon-button color="primary" (click)="abrirDialogo(sede)">
                <lucide-angular name="Edit" [size]="18"></lucide-angular>
              </button>
              <button mat-icon-button color="warn" (click)="eliminarSede(sede.id, sede.nombre)">
                <lucide-angular name="Trash" [size]="18"></lucide-angular>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
      </div>

      <ng-template #loadingSpinner>
        <div class="loading-spinner">
          <mat-spinner diameter="40"></mat-spinner>
          <p>Cargando sedes...</p>
        </div>
      </ng-template>
    </mat-card-content>
  </mat-card>
</div>
