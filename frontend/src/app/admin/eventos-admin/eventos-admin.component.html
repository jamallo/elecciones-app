<div class="eventos-admin">
  <div class="admin-header">
    <h1>Gestión de Eventos</h1>
    <button mat-raised-button color="primary" (click)="abrirDialogo()">
      <lucide-angular name="Plus" [size]="16"></lucide-angular>
      Nuevo evento
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div class="filter-container">
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Buscar evento</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Ej: Mitin">
          <lucide-angular name="Search" [size]="16" class="search-icon"></lucide-angular>
        </mat-form-field>
      </div>

      <div class="table-container" *ngIf="!loading; else loadingSpinner">
        <table mat-table [dataSource]="dataSource" matSort>
          <ng-container matColumnDef="titulo">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Título</th>
            <td mat-cell *matCellDef="let evento">{{ evento.titulo }}</td>
          </ng-container>

          <ng-container matColumnDef="fecha">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha</th>
            <td mat-cell *matCellDef="let evento">{{ evento.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
          </ng-container>

          <ng-container matColumnDef="lugar">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Lugar</th>
            <td mat-cell *matCellDef="let evento">{{ evento.lugar }}</td>
          </ng-container>

          <ng-container matColumnDef="tipo">
            <th mat-header-cell *matHeaderCellDef>Tipo</th>
            <td mat-cell *matCellDef="let evento">
              <mat-chip [color]="evento.tipo === 'MITIN' ? 'primary' : (evento.tipo === 'DEBATE' ? 'accent' : 'warn')" highlighted>
                {{ evento.tipo }}
              </mat-chip>
            </td>
          </ng-container>

          <ng-container matColumnDef="partido">
            <th mat-header-cell *matHeaderCellDef>Partido</th>
            <td mat-cell *matCellDef="let evento">
              <span *ngIf="evento.partidoSiglas">{{ evento.partidoSiglas }}</span>
              <span *ngIf="!evento.partidoSiglas" class="text-muted">General</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef>Acciones</th>
            <td mat-cell *matCellDef="let evento">
              <button mat-icon-button color="primary" (click)="abrirDialogo(evento)">
                <lucide-angular name="Edit" [size]="18"></lucide-angular>
              </button>
              <button mat-icon-button color="warn" (click)="eliminarEvento(evento.id, evento.titulo)">
                <lucide-angular name="Trash" [size]="18"></lucide-angular>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"><tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
      </div>

      <ng-template #loadingSpinner>
        <div class="loading-spinner">
          <mat-spinner diameter="40"></mat-spinner>
          <p>Cargando eventos...</p>
        </div>
      </ng-template>
    </mat-card-content>
  </mat-card>
</div>
