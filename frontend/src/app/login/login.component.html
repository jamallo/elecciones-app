<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>
        <lucide-angular name="Vote" [size]="24" class="login-icon"></lucide-angular>
        Iniciar sesión
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="credentials.email" name="email" required>
          <lucide-angular name="Mail" [size]="16" class="input-icon" matSuffix></lucide-angular>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" [(ngModel)]="credentials.password" name="password" required>
          <lucide-angular name="Lock" [size]="16" class="input-icon" matSuffix></lucide-angular>
        </mat-form-field>

        <div *ngIf="error" class="error-message">
          <lucide-angular name="AlertCircle" [size]="16"></lucide-angular>
          {{ error }}
        </div>

        <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || loading" class="full-width">
          @if (!loading) {
            <lucide-angular name="LogIn" [size]="16"></lucide-angular>
          } @else {
            <mat-spinner diameter="20"></mat-spinner>
          }
          {{ loading ? 'Iniciando...' : 'Iniciar sesión' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <button mat-button routerLink="/registro">
        ¿No tienes cuenta? Regístrate
      </button>
    </mat-card-actions>
  </mat-card>
</div>
